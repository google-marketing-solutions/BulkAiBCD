spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: bulkaibcd
  webflux:
    reactive:
      async-timeout: 600000
  mvc:
    async:
      request-timeout: 600000

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    com.bulkaibcd: INFO
    com.google.cloud: WARN
